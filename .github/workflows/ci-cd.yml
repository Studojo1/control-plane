name: Control Plane CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'services/control-plane/**'
      - '.github/workflows/service-ci-cd.yml'
  tags:
    - 'v*.*.*'

jobs:
  build-and-deploy:
    uses: ./.github/workflows/service-ci-cd.yml@main
    with:
      service_name: control-plane
      service_path: ./services/control-plane
      k8s_deployment_name: control-plane
      k8s_container_name: control-plane
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      DEV_PANEL_WEBHOOK_URL: ${{ secrets.DEV_PANEL_WEBHOOK_URL }}

